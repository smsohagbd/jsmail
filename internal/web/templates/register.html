{{define "title"}}Create Account — MailServer{{end}}
{{define "body"}}
<div style="min-height:100vh;display:flex;align-items:center;justify-content:center;background:#09090b;padding:16px;padding-left:max(16px,env(safe-area-inset-left));padding-right:max(16px,env(safe-area-inset-right));">
  <div style="width:100%;max-width:380px;">
    <div style="text-align:center;margin-bottom:32px;">
      <div style="width:48px;height:48px;background:#6366f1;border-radius:12px;display:flex;align-items:center;justify-content:center;margin:0 auto 14px;">
        <svg width="22" height="22" fill="none" stroke="#fff" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 8l7.89 4.26a2 2 0 002.22 0L21 8M5 19h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z"/></svg>
      </div>
      <div style="font-size:22px;font-weight:700;color:#fafafa;">Create Account</div>
      <div style="font-size:13px;color:#71717a;margin-top:4px;">Username = your SMTP login</div>
    </div>
    <div class="card" style="padding:28px;">
      {{if .Error}}
      <div style="background:#1c0606;border:1px solid #450a0a;color:#f87171;border-radius:8px;padding:10px 14px;margin-bottom:20px;font-size:13px;">{{.Error}}</div>
      {{end}}
      <form method="POST" action="/register">
        <div class="form-group">
          <label class="form-label">Username <span style="color:#52525b;">(SMTP login)</span></label>
          <input class="form-input" type="text" name="username" required autofocus/>
        </div>
        <div class="form-group">
          <label class="form-label">Email</label>
          <input class="form-input" type="email" name="email"/>
        </div>
        <div class="form-group">
          <label class="form-label">Password <span style="color:#52525b;">(SMTP password)</span></label>
          <input class="form-input" type="password" name="password" required/>
        </div>
        <button type="submit" class="btn btn-primary" style="width:100%;justify-content:center;padding:10px;">Create Account</button>
      </form>
      <div style="margin-top:18px;text-align:center;font-size:13px;color:#71717a;">
        Already have an account? <a href="/login" style="color:#818cf8;">Sign in</a>
      </div>
    </div>
  </div>
</div>
{{end}}
