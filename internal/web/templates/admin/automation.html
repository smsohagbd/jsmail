{{define "title"}}Automation — Admin{{end}}
{{define "content"}}
<div class="page-header">
  <div>
    <div class="page-title">All Automations</div>
    <div class="page-sub">Automation workflows across all users</div>
  </div>
</div>
<div class="page-body">

<div class="card">
  <div style="overflow-x:auto;">
    <table class="data-table reports-simple-table">
      <thead><tr>
        <th style="padding-left:20px;">User</th>
        <th>Name</th>
        <th>Trigger</th>
        <th>Status</th>
      </tr></thead>
      <tbody>
        {{range .Automations}}
        <tr>
          <td style="padding-left:20px;font-size:12px;color:#52525b;">{{.OwnerUsername}}</td>
          <td style="font-weight:600;">{{.Name}}</td>
          <td style="font-size:12px;color:#71717a;">{{.TriggerType}}</td>
          <td><span class="badge {{if eq .Status "active"}}badge-active{{else}}badge-inactive{{end}}">{{.Status}}</span></td>
        </tr>
        {{else}}
        <tr><td colspan="4" class="empty-state" style="padding:32px;">No automations yet</td></tr>
        {{end}}
      </tbody>
    </table>
  </div>
</div>
</div>
{{end}}
