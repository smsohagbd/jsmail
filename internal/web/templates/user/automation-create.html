{{define "title"}}New Automation — {{.ActiveUser}}{{end}}
{{define "content"}}
<div class="page-header">
  <div>
    <a href="/user/automation" style="font-size:12px;color:#71717a;text-decoration:none;">← Back to automation</a>
    <div class="page-title" style="margin-top:4px;">New Automation</div>
    <div class="page-sub">Trigger: when someone subscribes, opens, or clicks</div>
  </div>
</div>
<div class="page-body">

<div class="card">
  <form method="POST" action="/user/automation/create">
    <div class="card-body">
      <div class="form-group">
        <label class="form-label">Automation Name</label>
        <input class="form-input" name="name" required placeholder="Welcome Series"/>
      </div>
      <div class="form-group">
        <label class="form-label">Trigger</label>
        <select class="form-input" name="trigger_type">
          <option value="subscribe">Subscribe to list</option>
          <option value="email_opened">Email opened</option>
          <option value="email_clicked">Link clicked</option>
          <option value="delay">Time delay (after previous step)</option>
        </select>
      </div>
      <div class="form-group">
        <label class="form-label">Trigger List (for subscribe)</label>
        <select class="form-input" name="trigger_list_id">
          <option value="0">— Select —</option>
          {{range .Lists}}
          <option value="{{.ID}}">{{.Name}}</option>
          {{end}}
        </select>
      </div>
      <div class="form-group">
        <label class="form-label">First Step: Send Email</label>
        <select class="form-input" name="step_template_id">
          <option value="0">— Select template —</option>
          {{range .Templates}}
          <option value="{{.ID}}">{{.Name}}</option>
          {{end}}
        </select>
      </div>
      <div class="form-group">
        <label class="form-label">Delay (minutes, 0 = immediate)</label>
        <input class="form-input" name="step_delay" type="number" value="0" min="0"/>
      </div>
      <div style="display:flex;gap:8px;">
        <button type="submit" class="btn btn-primary">Create</button>
        <a href="/user/automation" class="btn btn-secondary">Cancel</a>
      </div>
    </div>
  </form>
</div>
</div>
{{end}}
