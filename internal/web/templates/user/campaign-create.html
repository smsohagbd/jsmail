{{define "title"}}New Campaign — {{.ActiveUser}}{{end}}
{{define "content"}}
<div class="page-header">
  <div>
    <a href="/user/campaigns" style="font-size:12px;color:#71717a;text-decoration:none;">← Back to campaigns</a>
    <div class="page-title" style="margin-top:4px;">New Campaign</div>
    <div class="page-sub">Select a template and list, then send</div>
  </div>
</div>
<div class="page-body">

{{if .Error}}<div style="background:#1c0606;border:1px solid #450a0a;color:#f87171;padding:12px 16px;border-radius:8px;margin-bottom:16px;">{{.Error}}</div>{{end}}

<div class="card">
  <form method="POST" action="/user/campaigns/create">
    <div class="card-body">
      <div class="form-group">
        <label class="form-label">Campaign Name</label>
        <input class="form-input" name="name" required placeholder="Welcome Series - Day 1"/>
      </div>
      <div class="form-group">
        <label class="form-label">Subject Line</label>
        <input class="form-input" name="subject" required placeholder="Hi {{"{{.FirstName}}"}}, welcome!"/>
      </div>
      <div class="form-group">
        <label class="form-label">From Name</label>
        <input class="form-input" name="from_name" placeholder="John Doe"/>
      </div>
      <div class="form-group">
        <label class="form-label">From Email</label>
        <input class="form-input" name="from_email" type="email" required placeholder="noreply@yourdomain.com"/>
      </div>
      <div class="form-group">
        <label class="form-label">Reply-To (optional)</label>
        <input class="form-input" name="reply_to" type="email" placeholder="support@yourdomain.com"/>
      </div>
      <div class="form-group">
        <label class="form-label">Template</label>
        <select class="form-input" name="template_id" required>
          <option value="">— Select —</option>
          {{range .Templates}}
          <option value="{{.ID}}">{{.Name}}</option>
          {{end}}
        </select>
      </div>
      <div class="form-group">
        <label class="form-label">Contact List</label>
        <select class="form-input" name="list_id" required>
          <option value="">— Select —</option>
          {{range .Lists}}
          <option value="{{.ID}}">{{.Name}}</option>
          {{end}}
        </select>
      </div>
      <div style="display:flex;gap:8px;">
        <button type="submit" class="btn btn-primary">Create Campaign</button>
        <a href="/user/campaigns" class="btn btn-secondary">Cancel</a>
      </div>
    </div>
  </form>
</div>
</div>
{{end}}
